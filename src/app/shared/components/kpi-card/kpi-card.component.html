<div class="kpi-card">
  <div class="kpi-card__header">
    <span class="kpi-card__title">{{ title }}</span>
    @if (formattedDelta) {
      <div class="kpi-card__trend" [class]="trendClass">
        <span class="material-icons kpi-card__trend-icon">{{ trendIcon }}</span>
        <span class="kpi-card__delta">{{ formattedDelta }}</span>
      </div>
    }
  </div>

  <div class="kpi-card__body">
    <div class="kpi-card__value-row">
      @if (format === 'currency') {
        <span class="kpi-card__prefix">₺</span>
      }
      <span class="kpi-card__value">{{ formattedValue }}</span>
    </div>
  </div>
</div>
